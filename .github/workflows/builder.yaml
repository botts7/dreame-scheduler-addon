name: Build add-on

on:
  push:
    branches: [main]
    paths:
      - "dreame_scheduler/**"
      - ".github/workflows/builder.yaml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: v
        run: |
          v=$(grep -m1 '^version:' dreame_scheduler/config.yaml | sed -E 's/version:[[:space:]]*"?([^"]+)"?.*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./dreame_scheduler
          file: ./dreame_scheduler/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.21
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dreame_scheduler-${{ matrix.arch }}:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/dreame_scheduler-${{ matrix.arch }}:latest
